version: '3.9'

# ── One command to run the entire stack: docker compose up ────
# Prerequisites: Docker Desktop installed on Windows 11
#   Download: https://www.docker.com/products/docker-desktop/

services:

  # ── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resumeiq-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      # CORS — must match the frontend origin
      ALLOWED_ORIGIN: http://localhost:3000
      # Rate limiting
      RATE_LIMIT_MAX: 20
      RATE_LIMIT_WINDOW_MINUTES: 15
      # File upload
      MAX_FILE_SIZE_MB: 5
      OCR_TRIGGER_THRESHOLD: 100
      # AI (optional — leave blank for rule-based mode)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_MAX_TOKENS: 900
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Points the built frontend at the backend container
        VITE_API_URL: http://localhost:5000/api
    container_name: resumeiq-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

# ── How to use ────────────────────────────────────────────────
# Build and start:   docker compose up --build
# Start (no rebuild):docker compose up
# Stop:              docker compose down
# View backend logs: docker compose logs -f backend
#
# With AI enabled:
#   ANTHROPIC_API_KEY=sk-ant-... docker compose up --build
#
# Open: http://localhost:3000
